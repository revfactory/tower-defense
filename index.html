<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>크리스탈 가드 — Crystal Guard</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!--
    DOM ID 계약: _workspace/02_architect_architecture.md §7
    아래 컨테이너의 ID·data 속성은 고정. 내부 콘텐츠 구성은 ui-dev 소유.
  -->
  <div id="app">
    <header id="hud">
      <span id="hud-gold"></span>
      <span id="hud-lives"></span>
      <span id="hud-wave"></span>
      <span id="hud-countdown"></span>
      <button id="btn-wave-start" type="button"></button>
      <button id="btn-speed" type="button"></button>
      <button id="btn-mute" type="button"></button>
    </header>

    <div id="stage">
      <canvas id="game-canvas" width="960" height="640"></canvas>
      <div id="tower-panel" class="hidden">
        <button id="btn-upgrade" type="button"></button>
        <button id="btn-sell" type="button"></button>
      </div>
      <button id="btn-cancel-placement" class="hidden" type="button">배치 취소</button>
      <div id="screen-title" class="screen">
        <button id="btn-start" type="button">게임 시작</button>
      </div>
      <div id="screen-victory" class="screen hidden">
        <button id="btn-restart-victory" type="button">다시 하기</button>
      </div>
      <div id="screen-defeat" class="screen hidden">
        <button id="btn-restart-defeat" type="button">다시 하기</button>
      </div>
    </div>

    <footer id="shop">
      <button class="shop-item" data-tower="arrow" type="button"></button>
      <button class="shop-item" data-tower="cannon" type="button"></button>
      <button class="shop-item" data-tower="frost" type="button"></button>
      <button class="shop-item" data-tower="arcane" type="button"></button>
    </footer>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
